name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Prepare FFmpeg bundle resource
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/bin
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath "$env:RUNNER_TEMP\ffmpeg" -Force
          Copy-Item (Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName src-tauri/bin/ffmpeg.exe
          & src-tauri/bin/ffmpeg.exe -version

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SIK Render ${{ github.ref_name }}'
          releaseBody: |
            ## SIK Render ${{ github.ref_name }}

            Local Blender render queue, FFmpeg transcode manager, and LAN render node monitor for SIKFilm workflows.

            ### Download

            Choose one installer from the Assets section below:

            - `SIK Render_*_x64-setup.exe` - recommended for normal installation.
            - `SIK Render_*_x64_en-US.msi` - recommended for managed or scripted installation.

            ### Requirements

            - Windows 10 or Windows 11.
            - Blender installed locally for render jobs.

            ### App Data

            Runtime data is stored under:

            ```text
            %APPDATA%\SIKFilm\Render\
            ```
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          tauriScript: bunx tauri
