name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  check-tag-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag and app versions
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          expected="v${version}"

          echo "tag=${tag}"
          echo "package=${version}"
          echo "tauri=${tauri_version}"

          if [[ "${tauri_version}" != "${version}" ]]; then
            echo "::error::tauri.conf.json version ${tauri_version} does not match package.json version ${version}."
            exit 1
          fi

          if [[ "${tag}" != "${expected}" ]]; then
            echo "::error::Tag ${tag} does not match package version ${expected}."
            exit 1
          fi

  build-windows:
    needs: [check-tag-version]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Prepare FFmpeg bundle resource
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/bin
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath "$env:RUNNER_TEMP\ffmpeg" -Force
          Copy-Item (Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName src-tauri/bin/ffmpeg.exe
          & src-tauri/bin/ffmpeg.exe -version

      - name: Generate changelog
        id: changelog
        shell: pwsh
        run: |
          $currentTag = '${{ github.ref_name }}'
          # Find the previous semver tag, falling back to the first commit.
          $prevTag = (git tag --list 'v*.*.*' --sort=-v:refname | Select-Object -Skip 1 -First 1)
          if (-not $prevTag) {
            $range = $currentTag
          } else {
            $range = "$prevTag..$currentTag"
          }
          $commits = (git log $range --no-merges --format="- %s (%h)" 2>&1) -join "`n"
          if (-not $commits) { $commits = "- Initial release" }
          if ($prevTag) {
            $changesTitle = "### Changes since $prevTag"
          } else {
            $changesTitle = "### Changes"
          }
          $updaterNotes = @"
          $changesTitle

          $commits
          "@
          $body = @"
          ## SIK Render $currentTag

          Local Blender render queue, FFmpeg transcode manager, and LAN render node monitor for SIKFilm workflows.

          $changesTitle

          $commits

          ### Download

          - `sik-render-setup-x64.exe` — recommended installer.
          - `sik-render-windows.zip` — portable, unzip and run.

          ### Requirements

          - Windows 10 or Windows 11.
          - Blender installed locally for render jobs.

          ### App Data

          Runtime data is stored under:

          ```text
          %APPDATA%\SIKFilm\Render\
          ```
          "@
          "updater_notes<<SIK_RENDER_UPDATER_NOTES" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $updaterNotes | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "SIK_RENDER_UPDATER_NOTES" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $body | Out-File -FilePath changelog.md -Encoding utf8

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SIK Render ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.updater_notes }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          tauriScript: bunx tauri
          args: --bundles nsis
          includeUpdaterJson: true

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Path src-tauri/target/release -Filter sik-render.exe |
            Where-Object { $_.FullName -notmatch 'deps|build|\.cargo' } |
            Select-Object -First 1
          if (-not $exe) { Write-Error "Release binary not found"; exit 1 }
          $portable = "sik-render-portable"
          New-Item -ItemType Directory -Force $portable
          Copy-Item $exe.FullName "$portable/"
          Get-ChildItem $exe.Directory -Filter *.dll -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$portable/" -ErrorAction SilentlyContinue
          if (Test-Path src-tauri/bin/ffmpeg.exe) {
            Copy-Item src-tauri/bin/ffmpeg.exe "$portable/"
          }
          Compress-Archive -Path "$portable/*" -DestinationPath "sik-render-windows.zip"

      - name: Upload fixed-name artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $setup = Get-ChildItem -Recurse -Path src-tauri/target/release/bundle/nsis -Filter "*_x64-setup.exe" |
            Select-Object -First 1
          if ($setup) {
            Copy-Item $setup.FullName "sik-render-setup-x64.exe"
            gh release upload ${{ github.ref_name }} "sik-render-setup-x64.exe" --clobber
          }
          gh release upload ${{ github.ref_name }} "sik-render-windows.zip" --clobber

      - name: Update release notes with changelog
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.ref_name }} --notes-file changelog.md
